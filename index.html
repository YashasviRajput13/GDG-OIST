<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDG OIST Bhopal | Learn. Build. Connect.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            --text-primary: #3c4043;
            --text-secondary: #5f6368;
        }
        body {
            font-family: 'Google Sans', 'Roboto', sans-serif;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            background-color: #ffffff;
            color: var(--text-primary);
        }
        .google-blue { color: var(--google-blue); }
        .google-red { color: var(--google-red); }
        .google-yellow { color: var(--google-yellow); }
        .google-green { color: var(--google-green); }
        .bg-google-blue { background-color: var(--google-blue); }
        .bg-google-red { background-color: var(--google-red); }
        .bg-google-yellow { background-color: var(--google-yellow); }
        .bg-google-green { background-color: var(--google-green); }
        
        @keyframes scroll {
          0% { transform: translateX(0); }
          100% { transform: translateX(-50%); }
        }
        .animate-marquee {
          animation: scroll 40s linear infinite;
        }

        @keyframes bounce-slow {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-15px); }
        }
        .animate-bounce-slow {
          animation: bounce-slow 4s ease-in-out infinite;
        }

        @keyframes scroll-hint {
          0% { transform: translateY(0); opacity: 1; }
          100% { transform: translateY(12px); opacity: 0; }
        }
        .animate-scroll-hint {
          animation: scroll-hint 1.5s ease-out infinite;
        }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card-shadow {
            box-shadow: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
        }
        .card-shadow:hover {
            box-shadow: 0 4px 8px 3px rgba(60,64,67,.15), 0 1px 3px 1px rgba(60,64,67,.15);
        }

        ::-webkit-scrollbar {
          width: 8px;
        }
        ::-webkit-scrollbar-track {
          background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
          background: #dadce0;
          border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
          background: #bdc1c6;
        }
    </style>
<script type="importmap">
{

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</html>
